<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="card login-card">
        <h1>Admin Login 🔐</h1>
        <p class="subtitle">กรุณาใส่รหัสผ่านเพื่อจัดการข้อความ</p>
        <input type="password" id="passwordInput" placeholder="รหัสผ่านแอดมิน">
        <button onclick="checkLogin()">เข้าสู่ระบบ</button>
        <p id="errorMsg" class="error-text"></p>
        <a href="index.html" class="admin-link">กลับหน้าหลัก</a>
    </div>
    <script src="script.js"></script>
</body>
</html>
